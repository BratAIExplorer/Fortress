name: Deploy to VPS

on:
  push:
    branches: [master, main]

env:
  VPS_HOST: 76.13.179.32
  VPS_USER: root
  VPS_APP_DIR: /opt/fortress
  VPS_APP_NAME: fortress-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install & Build
        working-directory: fortress-app
        run: |
          npm install
          npm run build
          echo "✓ Build successful"

      - name: Deploy to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST "
          cd $VPS_APP_DIR/$VPS_APP_NAME
          git fetch origin master
          git reset --hard origin/master
          npm install
          npm run build
          pm2 restart $VPS_APP_NAME || pm2 start ecosystem.config.js
          systemctl reload nginx
          echo '✓ Deployment complete'
          "

      - name: Health Check
        run: sleep 5 && curl -f https://fortressintelligence.space/_health || echo "Health check pending"
