name: Deploy to VPS

on:
  push:
    branches: [master, main]

env:
  VPS_HOST: 76.13.179.32
  VPS_USER: root
  VPS_APP_DIR: /opt/fortress
  VPS_APP_NAME: fortress-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: fortress-app
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: fortress-app
        run: npm run build

      - name: Verify build output
        working-directory: fortress-app
        run: |
          if [ ! -f ".next/standalone/server.js" ]; then
            echo "ERROR: Build output missing"
            exit 1
          fi
          echo "✓ Build successful - standalone server ready"

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new \
            $VPS_USER@$VPS_HOST << 'DEPLOY_SCRIPT'
          set -e
          echo "📦 Deploying to VPS..."
          
          if [ ! -d "$VPS_APP_DIR/$VPS_APP_NAME" ]; then
            echo "ERROR: App directory not found on VPS"
            exit 1
          fi
          
          cd "$VPS_APP_DIR/$VPS_APP_NAME"
          
          if [ -d .git ]; then
            git fetch origin master
            git reset --hard origin/master
            echo "✓ Git updated"
          else
            echo "⚠️  Not a git repo on VPS"
          fi
          
          if [ -f package.json ]; then
            npm install --no-audit --no-fund --production
            npm run build
            echo "✓ Build complete on VPS"
          fi
          
          if pm2 describe $VPS_APP_NAME >/dev/null 2>&1; then
            pm2 restart $VPS_APP_NAME
            echo "✓ PM2 restarted"
          elif [ -f ecosystem.config.js ]; then
            pm2 start ecosystem.config.js
            echo "✓ PM2 started"
          fi
          
          nginx -t >/dev/null 2>&1 && systemctl reload nginx
          echo "✓ Nginx reloaded"
          echo "✅ Deployment complete"
DEPLOY_SCRIPT

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://fortressintelligence.space/_health || echo "000")
          echo "Health check: HTTP $STATUS"
          if [ "$STATUS" != "000" ]; then
            echo "✅ App is responding"
          else
            echo "⚠️  App may still be starting up"
          fi
