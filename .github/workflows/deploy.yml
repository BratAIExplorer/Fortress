name: Deploy to VPS

on:
  push:
    branches: [master, main]

env:
  VPS_HOST: 76.13.179.32
  VPS_USER: root
  VPS_APP_DIR: /opt/fortress
  VPS_APP_NAME: fortress-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install
        working-directory: fortress-app
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: fortress-app
        run: npm run build

      - name: Verify build
        working-directory: fortress-app
        run: |
          test -f .next/standalone/server.js && echo "✓ Build verified" || exit 1

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/id_rsa -o ConnectTimeout=10 $VPS_USER@$VPS_HOST "
            cd $VPS_APP_DIR/$VPS_APP_NAME
            git fetch origin master
            git reset --hard origin/master
            npm install --no-audit --no-fund --production
            npm run build
            pm2 restart $VPS_APP_NAME || pm2 start ecosystem.config.js
            systemctl reload nginx
            echo '✓ Deployed'
          "

      - name: Health check
        run: sleep 5 && curl -sf https://fortressintelligence.space/_health || echo "Health check pending"
