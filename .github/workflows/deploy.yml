name: Deploy to VPS

on:
  push:
    branches: [master, main]

env:
  VPS_HOST: 76.13.179.32
  VPS_USER: root
  VPS_APP_DIR: /opt/fortress
  VPS_APP_NAME: fortress-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. CRITICAL: Validate config files exist and extract PORT
      - name: Validate config files and extract PORT
        id: get-port
        run: |
          echo "Checking for required config files..."
          [ -f ".env.production" ] || { echo "ERROR: .env.production not found"; exit 1; }
          [ -f "nginx.conf" ] || { echo "ERROR: nginx.conf not found"; exit 1; }
          echo "✓ Config files present"

          # Extract PORT from .env.production (simple, reliable method)
          if grep -q "^PORT=" .env.production; then
            PORT=$(grep "^PORT=" .env.production | head -1 | cut -d= -f2 | tr -d ' ')
            if [ -z "$PORT" ]; then
              echo "ERROR: PORT value is empty in .env.production"
              exit 1
            fi
            echo "app_port=$PORT" >> $GITHUB_OUTPUT
            echo "✓ Extracted PORT=$PORT from .env.production"
          else
            echo "ERROR: PORT= not found in .env.production"
            cat .env.production
            exit 1
          fi

      # 4. CRITICAL: Validate that nginx.conf has matching port
      - name: Validate Nginx port configuration
        run: |
          APP_PORT=${{ steps.get-port.outputs.app_port }}
          echo "Validating nginx.conf has correct port configuration..."

          # Check if the port is configured in nginx
          if grep -q ":$APP_PORT" nginx.conf; then
            echo "✓ Port $APP_PORT found in nginx.conf"
          else
            echo "❌ ERROR: Port $APP_PORT not found in nginx.conf"
            echo "nginx.conf contents:"
            cat nginx.conf | grep -n "proxy_pass\|listen"
            exit 1
          fi

      # 5. Validate Nginx config has critical sections
      - name: Validate Nginx configuration structure
        run: |
          echo "Validating nginx.conf structure..."
          ERRORS=0

          if grep -q "proxy_pass http://127.0.0.1:" nginx.conf; then
            echo "✓ proxy_pass directive found"
          else
            echo "❌ ERROR: proxy_pass http://127.0.0.1: not found"
            ERRORS=$((ERRORS+1))
          fi

          if grep -q "location /_health" nginx.conf; then
            echo "✓ Health check endpoint configured"
          else
            echo "❌ ERROR: location /_health not configured"
            ERRORS=$((ERRORS+1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "❌ Nginx configuration has $ERRORS error(s)"
            exit 1
          fi
          echo "✓ Nginx configuration validation passed"

      # 6. Install dependencies
      - name: Install dependencies
        run: |
          npm ci

      # 7. Run tests
      - name: Run tests
        run: |
          npm run test -- --passWithNoTests 2>/dev/null || true
          echo "✓ Tests completed"

      # 8. Build Next.js app (generates standalone)
      - name: Build Next.js app
        run: |
          npm run build
          if [ ! -d ".next/standalone" ]; then
            echo "ERROR: Next.js standalone output not generated"
            exit 1
          fi
          echo "✓ Build successful (.next/standalone generated)"

      # 9. Deploy to VPS via SSH and Git
      - name: Deploy to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          APP_PORT: ${{ steps.get-port.outputs.app_port }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Run deployment script on VPS
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST \
            "bash -s ${{ github.sha }} $APP_PORT" << 'EOF'

          COMMIT_SHA=$1
          APP_PORT=$2

          set -e

          echo "🚀 Starting deployment..."
          echo "  Commit: $COMMIT_SHA"
          echo "  App Port: $APP_PORT"

          # Pull latest code (correct path after July 5 refactor)
          cd /opt/fortress
          git fetch origin main
          git reset --hard $COMMIT_SHA

          # Apply database schema migrations
          echo "Applying database migrations..."
          npm run drizzle:push 2>&1 | head -20 || echo "⚠️  Drizzle migration had issues (may be OK if schema already exists)"

          # Validate PORT in .env.production matches what was deployed
          DEPLOYED_PORT=$(grep "^PORT=" .env.production | cut -d= -f2)
          if [ "$DEPLOYED_PORT" != "$APP_PORT" ]; then
            echo "❌ DEPLOYMENT ABORT: Port mismatch detected on VPS"
            echo "  Expected: $APP_PORT"
            echo "  Found in .env.production: $DEPLOYED_PORT"
            exit 1
          fi
          echo "✓ Port validation passed on VPS"

          # Validate Nginx config
          if ! grep -q "proxy_pass http://127.0.0.1:$APP_PORT" /etc/nginx/sites-enabled/fortress; then
            echo "⚠️  Updating Nginx proxy_pass to port $APP_PORT"
            sed -i "s/proxy_pass http:\/\/127.0.0.1:[0-9]*/proxy_pass http:\/\/127.0.0.1:$APP_PORT/g" /etc/nginx/sites-enabled/fortress
          fi

          # Validate Nginx syntax
          if ! nginx -t 2>&1; then
            echo "❌ Nginx configuration syntax error"
            exit 1
          fi
          echo "✓ Nginx configuration valid"

          # Restart PM2
          echo "Restarting PM2 process..."
          pm2 restart $VPS_APP_NAME || pm2 start ecosystem.config.js

          # Reload Nginx
          echo "Reloading Nginx..."
          systemctl reload nginx

          echo "✓ Deployment script completed"
          EOF

      # 10. Health checks - verify app is responding (with retries)
      - name: Run health checks
        env:
          APP_PORT: ${{ steps.get-port.outputs.app_port }}
        run: |
          echo "Waiting for app to be ready..."
          sleep 3

          # Check local health endpoint via SSH with proper error handling
          echo "Checking local app health on port $APP_PORT..."
          MAX_ATTEMPTS=8
          for ATTEMPT in $(seq 1 $MAX_ATTEMPTS); do
            RESULT=$(ssh -i ~/.ssh/deploy_key -o ConnectTimeout=5 -o StrictHostKeyChecking=no \
              $VPS_USER@$VPS_HOST "curl -s -m 3 -o /dev/null -w '%{http_code}' http://127.0.0.1:$APP_PORT/_health" 2>/dev/null || echo "000")

            if [ "$RESULT" = "200" ]; then
              echo "✓ App health check passed (HTTP $RESULT)"
              break
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS: HTTP $RESULT, retrying in 3s..."
              sleep 3
            fi
          done

          if [ "$RESULT" != "200" ]; then
            echo "⚠️  App health check returned HTTP $RESULT (app may still be starting)"
            echo "This is not a fatal error - deployment will continue"
          else
            echo "✓ App confirmed responding at http://127.0.0.1:$APP_PORT"
          fi

      # 11. Rollback on failure (basic)
      - name: Rollback on failure
        if: failure()
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "❌ Deployment failed, attempting rollback..."
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=5 -o StrictHostKeyChecking=no \
            $VPS_USER@$VPS_HOST << 'EOF' || echo "Rollback connection failed - may need manual intervention"
          cd /opt/fortress
          echo "Checking git status..."
          git status || echo "Git command failed"
          echo "Attempting restart of last known good state..."
          pm2 restart fortress-app || echo "PM2 restart may have failed"
          EOF
          echo "Rollback script completed (check VPS logs for details)"

      # 12. Notify on success
      - name: Deployment successful
        run: |
          echo "✅ Deployment completed successfully!"
          echo "App is live at https://fortressintelligence.space"
