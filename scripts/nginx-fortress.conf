server {
    listen 80 default_server;
    server_name 76.13.179.32 fortressintelligence.space www.fortressintelligence.space;
    # Always redirect to the canonical domain via HTTPS
    return 301 https://fortressintelligence.space$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name fortressintelligence.space www.fortressintelligence.space;

    # Handle www redirect to non-www for consistency
    if ($host = www.fortressintelligence.space) {
        return 301 https://fortressintelligence.space$request_uri;
    }

    ssl_certificate /etc/letsencrypt/live/fortressintelligence.space-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fortressintelligence.space-0001/privkey.pem;

    # Direct access to CSS/JS assets (Kills the 404 errors)
    location /_next/static/ {
        alias /opt/fortress/.next/static/;
        expires 365d;
        access_log off;
    }

    # Direct access to images/public files
    location /public/ {
        alias /opt/fortress/public/;
        expires 365d;
        access_log off;
    }

    # Proxy everything else to the Node.js server
    location / {
        # Force HTTPS for 1 year (HSTS)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
