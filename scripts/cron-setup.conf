# Fortress Intelligence: Automated Scanner CRON Schedule
# Copy this to /etc/cron.d/fortress-scanner on the VPS

# Environment Variables
CRON_SECRET=Wealth2027$
BASE_URL=http://localhost:3000

# 1. NSE (India): 4:30 PM IST (11:00 UTC) - 30 min after close
0 11 * * 1-5 curl -X POST $BASE_URL/api/scan/run \
    -H "Content-Type: application/json" \
    -H "x-cron-secret: $CRON_SECRET" \
    -d '{"market":"NSE","weights":{"l1":25,"l2":20,"l3":15,"l4":25,"l5":15}}'

# 2. US (NYSE/NASDAQ): 5:00 PM ET (22:00 UTC) - After close
0 22 * * 1-5 curl -X POST $BASE_URL/api/scan/run \
    -H "Content-Type: application/json" \
    -H "x-cron-secret: $CRON_SECRET" \
    -d '{"market":"US","weights":{"l1":25,"l2":20,"l3":15,"l4":25,"l5":15}}'

# 3. HKEX (Hong Kong): 5:30 PM HKT (09:30 UTC) - After close
30 9 * * 1-5 curl -X POST $BASE_URL/api/scan/run \
    -H "Content-Type: application/json" \
    -H "x-cron-secret: $CRON_SECRET" \
    -d '{"market":"HKEX","weights":{"l1":25,"l2":20,"l3":15,"l4":25,"l5":15}}'
