server {
    listen 80;
    listen [::]:80;
    server_name fortressintelligence.space www.fortressintelligence.space;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fortressintelligence.space www.fortressintelligence.space;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/fortressintelligence.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fortressintelligence.space/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/fortress-access.log;
    error_log /var/log/nginx/fortress-error.log;

    # Health check endpoint
    location /_health {
        proxy_pass http://127.0.0.1:3000/_health;
        access_log off;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }

    # Main proxy to Next.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
